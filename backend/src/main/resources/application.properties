spring.application.name=demo
spring.config.import=optional:file:.env.properties
server.port=8081
# --- Google OAuth2 ---
spring.security.oauth2.client.registration.google.client-id=${OAUTH_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${OAUTH_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# Google OAuth2 callback URI (must match what's registered in Google Cloud Console)
app.oauth2.redirect-uri=http://localhost:8081/api/auth/google/callback

# --- Microsoft OAuth2 (personal @outlook.com / Hotmail / Live accounts) ---
# NOTE: We use custom keys (app.oauth2.microsoft.*) instead of the spring.security.oauth2.client.*
# namespace to prevent Spring Boot's OAuth2 auto-configuration from trying to set up a
# provider-managed client for Microsoft (it would fail because 'microsoft' is not a built-in
# provider like 'google'). Our AuthController handles the full OAuth2 flow manually.
app.oauth2.microsoft.client-id=${MICROSOFT_AUTH_CLIENT_ID}
app.oauth2.microsoft.client-secret=${MICROSOFT_AUTH_CLIENT_SECRET}
app.oauth2.microsoft.redirect-uri=http://localhost:8081/api/auth/microsoft/callback

# --- Frontend redirect URLs (after OAuth2 success/failure) ---
app.frontend.success-url=http://localhost:5173/oauth2/redirect
app.frontend.error-url=http://localhost:5173/login?error=access_denied

